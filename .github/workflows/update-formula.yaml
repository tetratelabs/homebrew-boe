name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: Built On Envoy version
        required: true

permissions:
  contents: write

jobs:
  update-formula:
    name: Update Formula
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compute checksums and update formula
        run: |
          set -e
          
          # Strip leading 'v' from the input version if present
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          sed -i "s/VERSION = \".*\"/VERSION = \"${VERSION}\"/" Formula/boe.rb

          BASE_URL="https://github.com/tetratelabs/built-on-envoy/releases/download/v${VERSION}"
          PLATFORMS=(darwin_amd64 darwin_arm64 linux_amd64 linux_arm64)

          for platform in "${PLATFORMS[@]}"; do
            echo "Downloading boe for ${platform} from ${BASE_URL}/boe-${platform/_/-}"
            curl -sfL -o "/tmp/boe-${platform}" "${BASE_URL}/boe-${platform/_/-}"
            
            sha=$(sha256sum "/tmp/boe-${platform}" | cut -d ' ' -f 1)
            echo "SHA256 for ${platform}: ${sha}"
            sed -i "s/\"${platform}\" => \".*\"/\"${platform}\" => \"${sha}\"/" Formula/boe.rb
          done

          echo "Updated Formula/boe.rb:"
          cat Formula/boe.rb

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git add Formula/boe.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update boe formula to v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push origin "v${VERSION}"
